[build]
builder    = "NIXPACKS"
buildCommand = "npm install"

[deploy]
startCommand  = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
