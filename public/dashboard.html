<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>campro · Admin Dashboard</title>
<style>
  :root {
    --bg:      #0a0c12;
    --surface: #111420;
    --card:    #161926;
    --border:  #1e2336;
    --accent:  #4f6ef7;
    --green:   #22c97a;
    --yellow:  #f5c842;
    --red:     #f74f4f;
    --text:    #e2e6f0;
    --muted:   #5a6380;
    --font: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* ── Layout ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -.5px; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .badge { background: var(--border); border-radius: 999px; padding: 4px 12px; font-size: .75rem; color: var(--muted); }
  .badge.live { background: #1a2e1a; color: var(--green); }

  main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  /* ── Stats row ── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
  }
  .stat-card .label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .stat-card .value { font-size: 2rem; font-weight: 700; }
  .stat-card .sub   { font-size: .8rem; color: var(--muted); margin-top: 4px; }
  .val-green { color: var(--green); }
  .val-yellow{ color: var(--yellow); }
  .val-red   { color: var(--red); }
  .val-blue  { color: var(--accent); }

  /* ── Table ── */
  .section-title {
    font-size: .85rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  th {
    background: var(--surface);
    padding: 12px 20px;
    text-align: left;
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .verdict {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: .75rem;
    font-weight: 600;
  }
  .verdict.clean      { background: #0d2e1a; color: var(--green); }
  .verdict.suspicious { background: #2e2a0d; color: var(--yellow); }
  .verdict.high-risk  { background: #2e0d0d; color: var(--red); }

  .trust-bar-wrap { width: 80px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 8px; }
  .trust-bar { height: 100%; border-radius: 3px; }

  /* ── Empty / Loading states ── */
  .empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }
  .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty p { font-size: .9rem; }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 40px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Search / Filter ── */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
  }
  .search-input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-size: .875rem;
    width: 280px;
    outline: none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--muted);
    font-size: .875rem;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--text); }

  /* ── Detail modal ── */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.on { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 600px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; color: var(--muted);
    font-size: 1.4rem; cursor: pointer;
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 20px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .detail-item { background: var(--surface); border-radius: 8px; padding: 12px 16px; }
  .detail-item .dk { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }
  .detail-item .dv { font-size: 1rem; font-weight: 600; }
  .alerts-list { margin-top: 16px; }
  .alerts-list h3 { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
  .alert-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: .8rem;
  }
  .alert-item:last-child { border: none; }
  .sev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .sev-high   { background: var(--red); }
  .sev-medium { background: var(--yellow); }
  .sev-low    { background: var(--accent); }
  .alert-msg  { flex: 1; }
  .alert-time { color: var(--muted); white-space: nowrap; }

  /* ── Refresh btn ── */
  .refresh-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: #fff;
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  .refresh-btn:hover { opacity: .85; }

  @media (max-width: 700px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    header { padding: 14px 16px; }
    main { padding: 20px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">cam<span>pro</span> <span style="color:var(--muted);font-weight:400;font-size:.85rem">/ dashboard</span></div>
  <div class="header-right">
    <span class="badge live" id="liveCount">● 0 live</span>
    <span class="badge" id="lastRefresh">—</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</header>

<main>
  <!-- Stats Row -->
  <div class="stats" id="statsRow">
    <div class="stat-card"><div class="label">Total Reports</div><div class="value val-blue" id="st-total">—</div><div class="sub">all time</div></div>
    <div class="stat-card"><div class="label">Clean</div><div class="value val-green" id="st-clean">—</div><div class="sub">trust ≥ 75</div></div>
    <div class="stat-card"><div class="label">Suspicious</div><div class="value val-yellow" id="st-susp">—</div><div class="sub">trust 45–74</div></div>
    <div class="stat-card"><div class="label">High Risk</div><div class="value val-red" id="st-risk">—</div><div class="sub">trust &lt; 45</div></div>
  </div>

  <!-- Table -->
  <div class="section-title">
    <span>Recent Interview Reports</span>
  </div>

  <div class="toolbar">
    <input class="search-input" id="searchInput" placeholder="🔍  Search by meeting ID or name…" oninput="applyFilter()" />
    <button class="filter-btn" data-f="all"       onclick="setFilter('all',this)"       >All</button>
    <button class="filter-btn" data-f="clean"     onclick="setFilter('clean',this)"     >✅ Clean</button>
    <button class="filter-btn active" data-f=""   onclick="setFilter('suspicious',this)">⚠️ Suspicious</button>
    <button class="filter-btn"        data-f=""   onclick="setFilter('high-risk',this)" >🚨 High Risk</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Meeting ID</th>
          <th>Candidate</th>
          <th>Date / Time</th>
          <th>Duration</th>
          <th>Trust Score</th>
          <th>Alerts</th>
          <th>Verdict</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="reportsTbody">
        <tr><td colspan="8"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Detail Modal -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title">Interview Report</h2>
    <div class="detail-grid" id="modal-grid"></div>
    <div class="alerts-list" id="modal-alerts"></div>
  </div>
</div>

<script>
let allReports = [];
let activeFilter = 'all';

async function loadAll() {
  try {
    const [repRes, sesRes] = await Promise.all([
      fetch('/api/reports'),
      fetch('/api/sessions').catch(() => ({ json: () => ({ sessions: [] }) }))
    ]);
    const { reports } = await repRes.json();
    allReports = reports || [];

    updateStats();
    renderTable();
    document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('reportsTbody').innerHTML =
      `<tr><td colspan="8"><div class="empty"><div class="icon">⚠️</div><p>Failed to load reports. Is the server running?</p></div></td></tr>`;
  }
}

function updateStats() {
  const total  = allReports.length;
  const clean  = allReports.filter(r => r.trustScore >= 75).length;
  const susp   = allReports.filter(r => r.trustScore >= 45 && r.trustScore < 75).length;
  const risk   = allReports.filter(r => r.trustScore < 45).length;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-clean').textContent = clean;
  document.getElementById('st-susp').textContent  = susp;
  document.getElementById('st-risk').textContent  = risk;
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function applyFilter() { renderTable(); }

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let rows = allReports.filter(r => {
    const matchFilter =
      activeFilter === 'all'        ? true :
      activeFilter === 'clean'      ? r.trustScore >= 75 :
      activeFilter === 'suspicious' ? (r.trustScore >= 45 && r.trustScore < 75) :
      activeFilter === 'high-risk'  ? r.trustScore < 45 : true;
    const matchSearch =
      !q ||
      (r.meetingId || '').toLowerCase().includes(q) ||
      (r.candidateName || '').toLowerCase().includes(q) ||
      (r.interviewerName || '').toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  if (!rows.length) {
    document.getElementById('reportsTbody').innerHTML =
      `<tr><td colspan="8"><div class="empty"><div class="icon">📋</div><p>No reports match your filter.</p></div></td></tr>`;
    return;
  }

  document.getElementById('reportsTbody').innerHTML = rows.map(r => {
    const score   = r.trustScore ?? 0;
    const verdict = score >= 75 ? 'clean' : score >= 45 ? 'suspicious' : 'high-risk';
    const label   = score >= 75 ? 'CLEAN' : score >= 45 ? 'SUSPICIOUS' : 'HIGH RISK';
    const barColor= score >= 75 ? '#22c97a' : score >= 45 ? '#f5c842' : '#f74f4f';
    const date    = r.savedAt ? new Date(r.savedAt).toLocaleString() : '—';
    return `
    <tr>
      <td style="font-family:monospace;font-size:.8rem">${r.meetingId || '—'}</td>
      <td>${r.candidateName || '<span style="color:var(--muted)">—</span>'}</td>
      <td style="font-size:.8rem;color:var(--muted)">${date}</td>
      <td>${r.duration || '—'}</td>
      <td>
        <div class="trust-bar-wrap"><div class="trust-bar" style="width:${score}%;background:${barColor}"></div></div>
        <span style="font-weight:600">${score}</span>
      </td>
      <td>${r.alertCount ?? 0} <span style="color:var(--red);font-size:.8rem">(${r.highCount ?? 0} high)</span></td>
      <td><span class="verdict ${verdict}">${label}</span></td>
      <td><button class="filter-btn" style="padding:5px 12px;font-size:.75rem" onclick='openModal(${JSON.stringify(r).replace(/'/g,"&apos;")})'>View</button></td>
    </tr>`;
  }).join('');
}

function openModal(r) {
  document.getElementById('modal-title').textContent = `Report — ${r.meetingId || '?'}`;
  const score = r.trustScore ?? 0;
  const verdict = score >= 75 ? 'CLEAN ✅' : score >= 45 ? 'SUSPICIOUS ⚠️' : 'HIGH RISK 🚨';
  document.getElementById('modal-grid').innerHTML = `
    <div class="detail-item"><div class="dk">Trust Score</div><div class="dv">${score} / 100</div></div>
    <div class="detail-item"><div class="dk">Verdict</div><div class="dv">${verdict}</div></div>
    <div class="detail-item"><div class="dk">Duration</div><div class="dv">${r.duration || '—'}</div></div>
    <div class="detail-item"><div class="dk">Total Alerts</div><div class="dv">${r.alertCount ?? 0}</div></div>
    <div class="detail-item"><div class="dk">High Severity</div><div class="dv" style="color:var(--red)">${r.highCount ?? 0}</div></div>
    <div class="detail-item"><div class="dk">Candidate</div><div class="dv">${r.candidateName || '—'}</div></div>
    <div class="detail-item"><div class="dk">Interviewer</div><div class="dv">${r.interviewerName || '—'}</div></div>
    <div class="detail-item"><div class="dk">Saved At</div><div class="dv" style="font-size:.8rem">${r.savedAt ? new Date(r.savedAt).toLocaleString() : '—'}</div></div>
  `;

  const alerts = r.alerts || [];
  document.getElementById('modal-alerts').innerHTML = alerts.length ? `
    <h3>Alert Log (${alerts.length})</h3>
    ${alerts.map(a => `
      <div class="alert-item">
        <div class="sev-dot sev-${a.sev || 'low'}"></div>
        <div class="alert-msg">${a.msg || a.message || '?'}</div>
        <div class="alert-time">${a.time || ''}</div>
      </div>`).join('')}
  ` : '<p style="color:var(--muted);font-size:.85rem;margin-top:8px">No alert log available.</p>';

  document.getElementById('detailModal').classList.add('on');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('on');
}

document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target === document.getElementById('detailModal')) closeModal();
});

// Auto-refresh every 30s
loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
